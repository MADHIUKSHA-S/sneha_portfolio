# Render Blueprint — one-click deploy
# https://render.com/docs/blueprint-spec

services:
  # Backend Web Service (also serves the frontend)
  - type: web
    name: sneha-portfolio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sneha-portfolio-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: sneha-portfolio-db
    plan: free
    databaseName: sneha_portfolio
